<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(140deg, #fff7ed, #e0f2fe);
            color: #1f2937;
        }
        main {
            max-width: 860px;
            margin: 48px auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }
        form, .actions {
            display: grid;
            gap: 16px;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }
        input, textarea {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }
        button {
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #1d4ed8;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow: auto;
        }
    </style>
</head>
<body>
<main>
    <h1>Login Test</h1>
    <p>Login through the backend. The backend exchanges credentials with Supabase and returns the issued token.</p>

    <form id="login-form">
        <label>
            Email
            <input id="email" type="email" required>
        </label>
        <label>
            Password
            <input id="password" type="password" required>
        </label>
        <button type="submit">Login</button>
    </form>

    <div class="actions" style="margin-top: 24px;">
        <button id="debug-button" type="button">Call /api/auth/debug</button>
        <button id="logout-button" type="button">Logout</button>
    </div>

    <h2>Current access token</h2>
    <textarea id="token" rows="8" readonly placeholder="Login first"></textarea>

    <h2>Result</h2>
    <pre id="result">Waiting for input...</pre>

    <p><a href="/signup.html">Go to signup page</a></p>
</main>

<script>
    const ACCESS_TOKEN_KEY = 'projectweb.accessToken';
    const REFRESH_TOKEN_KEY = 'projectweb.refreshToken';

    function showResult(value) {
        document.getElementById('result').textContent = JSON.stringify(value, null, 2);
    }

    function getAccessToken() {
        return localStorage.getItem(ACCESS_TOKEN_KEY) ?? '';
    }

    function refreshTokenBox() {
        document.getElementById('token').value = getAccessToken();
    }

    function saveTokens(payload) {
        if (payload.accessToken) {
            localStorage.setItem(ACCESS_TOKEN_KEY, payload.accessToken);
        }
        if (payload.refreshToken) {
            localStorage.setItem(REFRESH_TOKEN_KEY, payload.refreshToken);
        }
    }

    function clearTokens() {
        localStorage.removeItem(ACCESS_TOKEN_KEY);
        localStorage.removeItem(REFRESH_TOKEN_KEY);
    }

    async function submitLogin(event) {
        event.preventDefault();

        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        let body;
        try {
            body = await response.json();
        } catch (error) {
            body = { message: 'Non-JSON response', status: response.status };
        }

        if (response.ok && body.status === 'AUTHENTICATED') {
            saveTokens(body);
        }

        refreshTokenBox();
        showResult({
            status: response.status,
            body
        });
    }

    async function callDebug() {
        const token = getAccessToken();

        if (!token) {
            showResult({ error: 'No access token available. Login first.' });
            return;
        }

        const response = await fetch('/api/auth/debug', {
            headers: {
                Accept: 'application/json',
                Authorization: `Bearer ${token}`
            }
        });

        let payload;
        try {
            payload = await response.json();
        } catch (error) {
            payload = { error: 'Non-JSON response', status: response.status };
        }

        showResult({
            status: response.status,
            body: payload
        });
    }

    function logout() {
        clearTokens();
        refreshTokenBox();
        showResult({ message: 'Stored tokens cleared' });
    }

    document.getElementById('login-form').addEventListener('submit', submitLogin);
    document.getElementById('debug-button').addEventListener('click', callDebug);
    document.getElementById('logout-button').addEventListener('click', logout);
    refreshTokenBox();
</script>
</body>
</html>
