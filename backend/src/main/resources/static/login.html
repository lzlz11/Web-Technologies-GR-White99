<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Login</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(140deg, #fff7ed, #e0f2fe);
            color: #1f2937;
        }
        main {
            max-width: 860px;
            margin: 48px auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }
        form, .actions {
            display: grid;
            gap: 16px;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }
        input, textarea {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }
        button {
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #1d4ed8;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow: auto;
        }
    </style>
</head>
<body>
<main>
    <h1>Supabase Login Test</h1>
    <p>Login here, then call the backend JWT debug endpoint with the access token that Supabase issued.</p>

    <form id="login-form">
        <label>
            Email
            <input id="email" type="email" required>
        </label>
        <label>
            Password
            <input id="password" type="password" required>
        </label>
        <button type="submit">Login</button>
    </form>

    <div class="actions" style="margin-top: 24px;">
        <button id="debug-button" type="button">Call /api/auth/debug</button>
        <button id="logout-button" type="button">Logout</button>
    </div>

    <h2>Current access token</h2>
    <textarea id="token" rows="8" readonly placeholder="Login first"></textarea>

    <h2>Result</h2>
    <pre id="result">Waiting for input...</pre>

    <p><a href="/signup.html">Go to signup page</a></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let supabaseClient;

    async function loadConfig() {
        const response = await fetch('/api/auth/config');
        if (!response.ok) {
            throw new Error('Failed to load backend config');
        }
        return response.json();
    }

    function showResult(value) {
        document.getElementById('result').textContent = JSON.stringify(value, null, 2);
    }

    async function refreshTokenBox() {
        const { data } = await supabaseClient.auth.getSession();
        document.getElementById('token').value = data.session?.access_token ?? '';
    }

    async function main() {
        const config = await loadConfig();
        if (!config.configured) {
            showResult({
                error: 'SUPABASE_PUBLISHABLE_KEY is missing on the backend',
                expectedEnv: 'SUPABASE_PUBLISHABLE_KEY'
            });
            return;
        }

        supabaseClient = window.supabase.createClient(
            config.supabaseUrl,
            config.supabasePublishableKey
        );

        await refreshTokenBox();

        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            await refreshTokenBox();
            showResult({
                error,
                data
            });
        });

        document.getElementById('debug-button').addEventListener('click', async () => {
            const { data } = await supabaseClient.auth.getSession();
            const token = data.session?.access_token;

            if (!token) {
                showResult({ error: 'No access token available. Login first.' });
                return;
            }

            const response = await fetch('/api/auth/debug', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

            let payload;
            try {
                payload = await response.json();
            } catch (error) {
                payload = { error: 'Non-JSON response', status: response.status };
            }

            showResult({
                status: response.status,
                body: payload
            });
        });

        document.getElementById('logout-button').addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signOut();
            await refreshTokenBox();
            showResult({ error, message: 'Signed out' });
        });
    }

    main().catch(error => showResult({ error: error.message }));
</script>
</body>
</html>
