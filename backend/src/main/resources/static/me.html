<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Test</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #eff6ff, #fef3c7);
            color: #1f2937;
        }
        main {
            max-width: 860px;
            margin: 48px auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }
        .actions, form {
            display: grid;
            gap: 16px;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }
        input, textarea {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }
        button {
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #7c3aed;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow: auto;
        }
        .muted {
            color: #475569;
        }
    </style>
</head>
<body>
<main>
    <h1>Business User Profile Test</h1>
    <p>This page reads the access token stored after login and calls <code>/api/users/me</code> with a Bearer header.</p>

    <div class="actions">
        <button id="load-profile" type="button">Load /api/users/me</button>
    </div>

    <label>
        Current access token
        <textarea id="token" rows="6" readonly placeholder="Login first"></textarea>
    </label>

    <form id="update-form">
        <label>
            Full name
            <input id="full-name" type="text" placeholder="Alice Martin" required>
        </label>
        <label>
            Phone
            <input id="phone" type="text" placeholder="+33 6 00 00 00 00">
        </label>
        <button type="submit">Update /api/users/me</button>
    </form>

    <p class="muted">If no token is shown here, go to the login page first.</p>

    <h2>Result</h2>
    <pre id="result">Waiting for input...</pre>

    <p><a href="/login.html">Go to login page</a></p>
</main>

<script>
    const ACCESS_TOKEN_KEY = 'projectweb.accessToken';

    function showResult(value) {
        document.getElementById('result').textContent = JSON.stringify(value, null, 2);
    }

    function getToken() {
        return localStorage.getItem(ACCESS_TOKEN_KEY) ?? '';
    }

    function refreshTokenBox() {
        document.getElementById('token').value = getToken();
    }

    async function callApi(path, options = {}) {
        const token = getToken();
        if (!token) {
            throw new Error('No access token available. Login first.');
        }

        const response = await fetch(path, {
            ...options,
            headers: {
                Accept: 'application/json',
                Authorization: `Bearer ${token}`,
                ...(options.body ? { 'Content-Type': 'application/json' } : {}),
                ...(options.headers ?? {})
            }
        });

        const body = await response.json().catch(() => ({
            message: 'Non-JSON response',
            status: response.status
        }));

        return { status: response.status, body };
    }

    async function loadProfile() {
        try {
            const result = await callApi('/api/users/me', { method: 'GET' });
            if (result.status === 200) {
                document.getElementById('full-name').value = result.body.fullName ?? '';
                document.getElementById('phone').value = result.body.phone ?? '';
            }
            showResult(result);
        } catch (error) {
            showResult({ error: error.message });
        }
    }

    async function updateProfile(event) {
        event.preventDefault();

        try {
            const result = await callApi('/api/users/me', {
                method: 'PUT',
                body: JSON.stringify({
                    fullName: document.getElementById('full-name').value,
                    phone: document.getElementById('phone').value
                })
            });
            showResult(result);
        } catch (error) {
            showResult({ error: error.message });
        }
    }

    document.getElementById('load-profile').addEventListener('click', loadProfile);
    document.getElementById('update-form').addEventListener('submit', updateProfile);
    refreshTokenBox();
</script>
</body>
</html>
