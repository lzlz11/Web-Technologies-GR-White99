<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Test</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #eff6ff, #fef3c7);
            color: #1f2937;
        }
        main {
            max-width: 860px;
            margin: 48px auto;
            padding: 32px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }
        .actions, form {
            display: grid;
            gap: 16px;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }
        input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }
        button {
            padding: 12px 16px;
            border: 0;
            border-radius: 10px;
            background: #7c3aed;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow: auto;
        }
    </style>
</head>
<body>
<main>
    <h1>Business User Profile Test</h1>
    <p>This page reuses the Supabase browser session and calls <code>/api/users/me</code> with the current access token.</p>

    <div class="actions">
        <button id="load-profile" type="button">Load /api/users/me</button>
    </div>

    <form id="update-form">
        <label>
            Full name
            <input id="full-name" type="text" placeholder="Alice Martin" required>
        </label>
        <label>
            Phone
            <input id="phone" type="text" placeholder="+33 6 00 00 00 00">
        </label>
        <button type="submit">Update /api/users/me</button>
    </form>

    <h2>Result</h2>
    <pre id="result">Waiting for input...</pre>

    <p><a href="/login.html">Go to login page</a></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let supabaseClient;

    async function loadConfig() {
        const response = await fetch('/api/auth/config');
        if (!response.ok) {
            throw new Error('Failed to load backend config');
        }
        return response.json();
    }

    function showResult(value) {
        document.getElementById('result').textContent = JSON.stringify(value, null, 2);
    }

    async function getToken() {
        const { data } = await supabaseClient.auth.getSession();
        return data.session?.access_token;
    }

    async function callApi(path, options = {}) {
        const token = await getToken();
        if (!token) {
            throw new Error('No access token available. Login first.');
        }

        const response = await fetch(path, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
                ...(options.headers ?? {})
            }
        });

        const body = await response.json().catch(() => ({}));
        return { status: response.status, body };
    }

    async function main() {
        const config = await loadConfig();
        if (!config.configured) {
            showResult({
                error: 'SUPABASE_PUBLISHABLE_KEY is missing on the backend',
                expectedEnv: 'SUPABASE_PUBLISHABLE_KEY'
            });
            return;
        }

        supabaseClient = window.supabase.createClient(
            config.supabaseUrl,
            config.supabasePublishableKey
        );

        document.getElementById('load-profile').addEventListener('click', async () => {
            try {
                const result = await callApi('/api/users/me', { method: 'GET' });
                if (result.status === 200) {
                    document.getElementById('full-name').value = result.body.fullName ?? '';
                    document.getElementById('phone').value = result.body.phone ?? '';
                }
                showResult(result);
            } catch (error) {
                showResult({ error: error.message });
            }
        });

        document.getElementById('update-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
                const result = await callApi('/api/users/me', {
                    method: 'PUT',
                    body: JSON.stringify({
                        fullName: document.getElementById('full-name').value,
                        phone: document.getElementById('phone').value
                    })
                });
                showResult(result);
            } catch (error) {
                showResult({ error: error.message });
            }
        });
    }

    main().catch(error => showResult({ error: error.message }));
</script>
</body>
</html>
